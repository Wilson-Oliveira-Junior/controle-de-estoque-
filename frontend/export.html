<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exportar - Controle de Apostilas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://cdn.datatables.net/2.0.8/css/dataTables.bootstrap5.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-shell">
    <div class="container">
      <div class="topbar">
        <img src="../assets/Logo/logo-prepara.png" alt="Prepara logo" />
        <div class="brand-title">
          <strong>Prepara Controle</strong>
          <span>Exportação em XLSX</span>
        </div>
      </div>
      <header class="page-header">
        <div>
          <span class="hero-badge">Exportar</span>
          <h1>Gerar planilha de controle</h1>
          <p>Exporta cursos, acompanhamentos, progresso calculado e calendário em um único arquivo Excel.</p>
        </div>
      </header>

      <nav class="menu">
        <a href="index.html">Início</a>
        <a href="users.html">Alunos</a>
        <a href="add.html">Cursos</a>
        <div class="menu-dropdown dropdown">
          <a href="estoque.html" class="dropdown-toggle" data-bs-toggle="dropdown" role="button" aria-expanded="false">Controle</a>
          <div class="dropdown-menu">
            <a class="dropdown-item" href="withdraw.html">Acompanhamento</a>
            <a class="dropdown-item" href="estoque.html">Progresso</a>
            <a class="dropdown-item" href="historico.html">Calendário e histórico</a>
          </div>
        </div>
        <a href="turmas.html">Turmas</a>
        <a href="export.html" class="active">Exportar</a>
      </nav>
      <div id="serverStatus" class="server-status">Verificando status do servidor...</div>

      <section class="card form-card">
        <form id="exportForm" class="form-stack">
          <label class="checkbox-label">
            <input type="checkbox" id="exportCourses" checked />
            Incluir cursos
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="exportControls" checked />
            Incluir acompanhamentos
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="exportProgress" checked />
            Incluir progresso calculado
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="exportHolidays" checked />
            Incluir feriados
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="exportVacations" checked />
            Incluir férias
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="exportAudit" checked />
            Incluir auditoria (quem alterou)
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="exportPdf" checked />
            Incluir PDF resumo
          </label>
          <button type="submit" class="primary-button">Gerar arquivo Excel</button>
          <div id="exportFeedback" class="info"></div>
        </form>
      </section>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/2.0.8/js/dataTables.js"></script>
  <script src="https://cdn.datatables.net/2.0.8/js/dataTables.bootstrap5.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="apostila-app.js"></script>
</body>
</html>
