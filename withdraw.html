<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retirar material - Controle de Estoque</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-shell">
    <div class="container">
      <div class="topbar">
        <img src="Logo/logo-prepara.png" alt="Prepara logo" />
        <div class="brand-title">
          <strong>Prepara Controle</strong>
          <span>Registrar retiradas</span>
        </div>
      </div>
      <header class="page-header">
        <div>
          <span class="hero-badge">Retirar</span>
          <h1>Retirar material</h1>
          <p>Registrar a retirada de material pelos alunos.</p>
        </div>
      </header>

      <nav class="menu">
        <a href="index.html">Início</a>
        <a href="add.html">Adicionar</a>
        <a href="withdraw.html" class="active">Retirar</a>
        <a href="estoque.html">Estoque</a>
        <a href="historico.html">Histórico</a>
        <a href="export.html">Exportar</a>
      </nav>
      <div id="serverStatus" class="server-status">Verificando status do servidor...</div>

      <section class="card form-card">
        <form id="withdrawForm" class="form-stack">
          <label>
            Material
            <select id="withdrawMaterial" required>
              <option value="">Selecione um material</option>
            </select>
          </label>
          <label>
            Quantidade a retirar
            <input type="number" id="withdrawQuantity" min="1" value="1" required />
          </label>
          <label>
            Nome do aluno
            <input type="text" id="studentName" placeholder="Nome do aluno" required />
          </label>
          <label>
            Responsável
            <input type="text" id="withdrawResponsible" placeholder="Nome do responsável" required />
          </label>
          <label>
            Data
            <input type="date" id="withdrawDate" required />
          </label>
          <button type="submit" class="secondary-button">Registrar retirada</button>
        </form>
      </section>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
